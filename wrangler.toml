name = "mistral-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Cron: send reminders every hour
[triggers]
crons = ["0 * * * *"]

# KV namespace for reminders
# Run: npx wrangler kv:namespace create REMINDERS
# Then fill in the id below
[[kv_namespaces]]
binding = "REMINDERS"
id = "FILL_IN_KV_NAMESPACE_ID"

# Secrets (set via: npx wrangler secret put TG_BOT_TOKEN)
# - TG_BOT_TOKEN  : your Telegram bot token
# - MISTRAL_KEY   : your Mistral API key
