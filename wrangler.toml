name = "mistral-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Secrets (set via: npx wrangler secret put MISTRAL_KEY)
# - MISTRAL_KEY : your Mistral API key

# ── Оплата картой (YooKassa direct, #27b) ────────────────
# Чтобы включить кнопки «Купить» на экране Premium:
# 1. Зарегистрируй магазин в ЮKassa (yookassa.ru), возьми shopId и секретный ключ
# 2. npx wrangler secret put YOOKASSA_SHOP_ID
# 3. npx wrangler secret put YOOKASSA_SECRET_KEY
# 4. (опционально) npx wrangler secret put PAY_RETURN_URL — ссылка возврата после оплаты
#    (по умолчанию https://t.me; лучше ссылку на бота, напр. https://t.me/your_bot/app)
# 5. npx wrangler deploy
# Пока секреты не заданы, /pay/create отдаёт 503 и приложение показывает
# «Оплата картой скоро будет доступна» — без ошибок. Цены в worker.js (PLANS)
# должны совпадать с ценами в index.html.

# ── Защита воркера: проверка Telegram initData (#34) ─────
# Пока TG_BOT_TOKEN не задан — воркер пускает всех (fail-open), поведение не меняется.
# Как зададите — /mistral и /pay/* начнут отвечать только реальным пользователям бота
# (проверяется HMAC-подпись initData). Тот же токен нужен для push-напоминаний.
#   npx wrangler secret put TG_BOT_TOKEN --name mistral-proxy   (токен от @BotFather)
# Откат, если что-то сломалось: npx wrangler secret delete TG_BOT_TOKEN --name mistral-proxy

# ── БД прогресса пользователей (#31, D1) ─────────────────
# Заменяет Telegram CloudStorage как источник правды между устройствами
# (тот работает, но непрозрачен — нельзя посмотреть, что там реально лежит).
# Провижининг: npx wrangler d1 create smartai-progress (уже создана)
# Миграция схемы: npx wrangler d1 migrations apply smartai-progress --local|--remote
[[d1_databases]]
binding = "DB"
database_name = "smartai-progress"
database_id = "b8acf87b-2203-4112-80e4-ddb1dcc7b679"

# ── /start webhook (кнопка запуска Mini App) ─────────────
# Отдельный секрет для проверки, что запросы на /tg-webhook реально шлёт
# Telegram (передаётся в X-Telegram-Bot-Api-Secret-Token при setWebhook).
#   npx wrangler secret put TG_WEBHOOK_SECRET   (любая случайная строка)
# Активация (после деплоя воркера), подставив токен бота и тот же секрет:
#   curl -F "url=https://mistral-proxy.s-vagit-f1f.workers.dev/tg-webhook" \
#        -F "secret_token=<TG_WEBHOOK_SECRET>" \
#        https://api.telegram.org/bot<TG_BOT_TOKEN>/setWebhook

# Notifications (add later when KV namespace is ready):
# 1. npx wrangler kv:namespace create REMINDERS
# 2. Uncomment and fill in id below
# 3. npx wrangler secret put TG_BOT_TOKEN
#
# [triggers]
# crons = ["0 * * * *"]
#
# [[kv_namespaces]]
# binding = "REMINDERS"
# id = "FILL_IN_KV_NAMESPACE_ID"
