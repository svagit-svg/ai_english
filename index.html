
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartAI Learner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-20">

    <main id="main-container" class="max-w-md mx-auto p-4">
        
        <!-- Screen: Chat -->
        <section id="screen-chat">
            <h2 class="text-xl font-bold mb-4">Общение</h2>
            <div class="grid grid-cols-1 gap-3">
                <button class="p-4 bg-slate-900 border border-slate-800 rounded-xl text-left flex items-center gap-3 hover:border-indigo-500 transition-all">
                    <i class="fa-solid fa-laptop-code text-indigo-500"></i> Английский для IT
                </button>
                <button class="p-4 bg-slate-900 border border-slate-800 rounded-xl text-left flex items-center gap-3 hover:border-emerald-500 transition-all">
                    <i class="fa-solid fa-plane text-emerald-500"></i> Путешествия
                </button>
                <button class="p-4 bg-slate-900 border border-slate-800 rounded-xl text-left flex items-center gap-3 hover:border-amber-500 transition-all">
                    <i class="fa-solid fa-briefcase text-amber-500"></i> Бизнес
                </button>
            </div>
        </section>

        <!-- Screen: Courses -->
        <section id="screen-courses" class="hidden">
            <h2 class="text-xl font-bold mb-4">Курсы</h2>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="openCourse('IT Interview Pro', 'Подготовка к собеседованиям.')" class="p-4 bg-slate-900 border border-slate-800 rounded-xl text-left hover:border-indigo-500 transition-all"><h3 class="font-bold"><i class="fa-solid fa-laptop-code text-indigo-500 mr-2"></i> IT Interview Pro</h3></button>
                <button onclick="openCourse('Business English', 'Деловые переговоры.')" class="p-4 bg-slate-900 border border-slate-800 rounded-xl text-left hover:border-indigo-500 transition-all"><h3 class="font-bold"><i class="fa-solid fa-briefcase text-indigo-500 mr-2"></i> Business English</h3></button>
                <button onclick="openCourse('Speaking Club', 'Разговорная практика.')" class="p-4 bg-slate-900 border border-slate-800 rounded-xl text-left hover:border-indigo-500 transition-all"><h3 class="font-bold"><i class="fa-solid fa-comments text-indigo-500 mr-2"></i> Speaking Club</h3></button>
                <button onclick="openCourse('Grammar Master', 'Грамматика без зубрежки.')" class="p-4 bg-slate-900 border border-slate-800 rounded-xl text-left hover:border-indigo-500 transition-all"><h3 class="font-bold"><i class="fa-solid fa-pen-ruler text-indigo-500 mr-2"></i> Grammar Master</h3></button>
                <button onclick="openCourse('Travel English', 'Английский для туристов.')" class="p-4 bg-slate-900 border border-slate-800 rounded-xl text-left hover:border-indigo-500 transition-all"><h3 class="font-bold"><i class="fa-solid fa-plane text-indigo-500 mr-2"></i> Travel English</h3></button>
                <button onclick="openCourse('Pronunciation', 'Работа над акцентом.')" class="p-4 bg-slate-900 border border-slate-800 rounded-xl text-left hover:border-indigo-500 transition-all"><h3 class="font-bold"><i class="fa-solid fa-microphone text-indigo-500 mr-2"></i> Pronunciation</h3></button>
            </div>
        </section>

        <!-- Course Detail Screen -->
        <section id="screen-course-detail" class="hidden">
            <button onclick="switchTab('courses')" class="text-slate-400 text-sm mb-4"><i class="fa-solid fa-chevron-left"></i> Назад</button>
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                <h2 id="detail-title" class="text-2xl font-bold mb-2"></h2>
                <p id="detail-desc" class="text-slate-400 mb-6"></p>
                <button onclick="switchTab('chat')" class="w-full bg-indigo-600 py-3 rounded-xl font-bold">Начать обучение</button>
            </div>
        </section>

        <!-- Premium Screen -->
        <section id="screen-premium" class="hidden">
            <h2 class="text-xl font-bold mb-6 text-center">Премиум подписка</h2>
            <div class="space-y-4">
                <div class="p-5 bg-slate-900 border border-slate-800 rounded-2xl">
                    <h3 class="font-bold text-lg">Неделя</h3>
                    <div class="text-2xl font-black mb-4">149 <span class="text-sm font-normal text-slate-500">Stars</span></div>
                    <button class="w-full border border-indigo-600 text-indigo-400 py-3 rounded-xl font-bold">Выбрать</button>
                </div>
                <div class="p-5 bg-slate-800 border-2 border-indigo-500 rounded-2xl relative">
                    <div class="absolute -top-3 left-4 bg-indigo-500 text-[10px] font-bold px-2 py-1 rounded-full">ПОПУЛЯРНЫЙ</div>
                    <h3 class="font-bold text-lg">Месяц</h3>
                    <div class="text-2xl font-black mb-4">449 <span class="text-sm font-normal text-slate-400">Stars</span></div>
                    <button class="w-full bg-indigo-600 py-3 rounded-xl font-bold">Выбрать</button>
                </div>
                <div class="p-5 bg-slate-900 border border-slate-800 rounded-2xl">
                    <h3 class="font-bold text-lg">Год</h3>
                    <div class="text-2xl font-black mb-4">2999 <span class="text-sm font-normal text-slate-500">Stars</span></div>
                    <button class="w-full border border-slate-700 py-3 rounded-xl font-bold">Выбрать</button>
                </div>
            </div>
        </section>

        <!-- Profile Screen -->
        <section id="screen-profile" class="hidden">
            <h2 class="text-xl font-bold mb-4">Профиль</h2>
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex items-center gap-4 mb-6">
                <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center text-2xl">👤</div>
                <div>
                    <h3 class="font-bold text-lg">Ученик SmartAI</h3>
                    <span class="text-indigo-400 text-xs font-bold">PREMIUM MEMBER</span>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 text-center">
                    <div class="text-orange-500 mb-1"><i class="fa-solid fa-fire"></i></div>
                    <div class="font-bold">5</div>
                </div>
                <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 text-center">
                    <div class="text-indigo-500 mb-1"><i class="fa-solid fa-book-open"></i></div>
                    <div class="font-bold">12</div>
                </div>
                <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 text-center">
                    <div class="text-emerald-500 mb-1"><i class="fa-solid fa-trophy"></i></div>
                    <div class="font-bold">450</div>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 p-3 flex justify-around z-50">
        <button id="nav-chat" onclick="switchTab('chat')" class="text-indigo-500 font-bold flex flex-col items-center gap-1 text-[10px]"><i class="fa-solid fa-comments"></i> Общение</button>
        <button id="nav-courses" onclick="switchTab('courses')" class="text-slate-500 flex flex-col items-center gap-1 text-[10px]"><i class="fa-solid fa-book"></i> Курсы</button>
        <button id="nav-premium" onclick="switchTab('premium')" class="text-slate-500 flex flex-col items-center gap-1 text-[10px]"><i class="fa-solid fa-star"></i> Премиум</button>
        <button id="nav-profile" onclick="switchTab('profile')" class="text-slate-500 flex flex-col items-center gap-1 text-[10px]"><i class="fa-solid fa-user"></i> Профиль</button>
    </nav>

    <script>
        function openCourse(title, desc) {
            document.getElementById('screen-courses').classList.add('hidden');
            document.getElementById('screen-course-detail').classList.remove('hidden');
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-desc').innerText = desc;
        }

        function switchTab(id) {
            const screens = ['courses', 'course-detail', 'chat', 'premium', 'profile'];
            screens.forEach(s => document.getElementById('screen-' + s).classList.add('hidden'));
            const target = (id === 'course-detail') ? 'screen-course-detail' : 'screen-' + id;
            document.getElementById(target).classList.remove('hidden');
            ['courses', 'chat', 'premium', 'profile'].forEach(tab => {
                document.getElementById('nav-' + tab).className = (id === tab) ? "text-indigo-500 font-bold flex flex-col items-center gap-1 text-[10px]" : "text-slate-500 flex flex-col items-center gap-1 text-[10px]";
            });
        }
    </script>
</body>
</html>
